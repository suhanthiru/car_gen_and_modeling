<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1116">
<title>cargen — capture</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --line: #262d36;
    --text: #e6edf3; --muted: #8b949e; --accent: #3b82f6;
    --ok: #2ea043; --warn: #d29922;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: max(16px, env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
    max-width: 560px; margin-inline: auto;
  }
  header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 20px; }
  h1 { font-size: 20px; margin: 0; letter-spacing: -0.01em; }
  .tag { color: var(--muted); font-size: 12px; }
  section {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 16px; margin-bottom: 14px;
  }
  h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); margin: 0 0 12px;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input[type=text], select {
    width: 100%; padding: 11px 12px; font-size: 16px; /* 16px stops iOS zoom */
    background: #0d1117; color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
  }
  input[type=text]:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .row { display: flex; gap: 10px; margin-top: 12px; }
  .btn {
    flex: 1; padding: 14px; font-size: 15px; font-weight: 600;
    border: 1px solid var(--line); border-radius: 10px;
    background: #21262d; color: var(--text); cursor: pointer;
  }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn:disabled { opacity: 0.45; }
  input[type=file] { display: none; }
  .bar { height: 6px; background: #0d1117; border-radius: 3px; overflow: hidden; margin-top: 14px; }
  .bar > div { height: 100%; width: 0; background: var(--accent); transition: width 0.2s; }
  .status { font-size: 13px; color: var(--muted); margin-top: 10px; min-height: 20px; }
  .status.ok { color: var(--ok); } .status.err { color: #f85149; }
  .toggle { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .toggle small { color: var(--muted); display: block; font-size: 12px; margin-top: 2px; }
  .switch { position: relative; width: 46px; height: 26px; flex: none; }
  .switch input { opacity: 0; width: 100%; height: 100%; margin: 0; }
  .slider {
    position: absolute; inset: 0; background: #30363d; border-radius: 13px;
    transition: 0.2s; pointer-events: none;
  }
  .slider::before {
    content: ""; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: 0.2s;
  }
  .switch input:checked + .slider { background: var(--ok); }
  .switch input:checked + .slider::before { transform: translateX(20px); }
  ul { list-style: none; padding: 0; margin: 0; }
  li {
    padding: 11px 0; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  li:last-child { border-bottom: 0; }
  .name { font-weight: 600; }
  .meta { font-size: 12px; color: var(--muted); }
  .mini { padding: 6px 10px; font-size: 12px; flex: none; }
  .mini.ok { background: var(--ok); border-color: var(--ok); color: #fff; }
  .mini.no { background: transparent; }
  a { color: var(--accent); text-decoration: none; }
  .empty { color: var(--muted); font-size: 13px; }
  .pend { border-left: 3px solid var(--warn); padding-left: 10px; }
</style>
</head>
<body>
<header>
  <h1>cargen</h1><span class="tag">capture</span>
</header>

<section>
  <h2>Scan a vehicle</h2>
  <label for="name">Vehicle name (required)</label>
  <input type="text" id="name" placeholder="e.g. bobs-civic" autocomplete="off" enterkeyhint="done">
  <label for="device" style="margin-top:12px">Device type</label>
  <select id="device">
    <option value="phone">Phone (handheld)</option>
    <option value="camera">Camera</option>
    <option value="pi">Raspberry Pi</option>
    <option value="cctv">CCTV (low quality)</option>
  </select>
  <div class="row">
    <button class="btn primary" id="photoBtn">Take photo</button>
    <button class="btn" id="videoBtn">Walk-around video</button>
  </div>
  <input type="file" id="photoIn" accept="image/*" capture="environment">
  <input type="file" id="videoIn" accept="video/*" capture="environment">
  <div class="bar"><div id="prog"></div></div>
  <div class="status" id="status">Name the car, then capture. Files land on the server.</div>
</section>

<section>
  <h2>Duplicate handling</h2>
  <div class="toggle">
    <div>
      <strong>Auto-merge</strong>
      <small id="amHint">Off — duplicates are flagged for your approval.</small>
    </div>
    <label class="switch">
      <input type="checkbox" id="autoMerge"><span class="slider"></span>
    </label>
  </div>
  <div id="pending" style="margin-top:12px"></div>
</section>

<section>
  <h2>Vehicles</h2>
  <ul id="vehicles"><li class="empty">Nothing scanned yet.</li></ul>
</section>

<script src="app.js"></script>
</body>
</html>
