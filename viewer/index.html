<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cargen — viewer</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #ffffff; }
  #stage { position: fixed; inset: 0; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #1b1f24;
  }
  #hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px);
    border: 1px solid #e1e4e8; border-radius: 12px; padding: 14px 16px;
    min-width: 210px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
  }
  h1 { font-size: 15px; margin: 0 0 2px; }
  .sub { font-size: 12px; color: #6a737d; margin-bottom: 12px; }
  .stat { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
  .stat b { font-variant-numeric: tabular-nums; }
  .controls { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e1e4e8; }
  .ctl {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
    padding: 4px 0; cursor: pointer; user-select: none;
  }
  .ctl input { accent-color: #3b82f6; width: 15px; height: 15px; }
  .legend { display: none; margin-top: 8px; font-size: 11px; color: #6a737d; }
  .legend.on { display: block; }
  .seg { margin-bottom: 10px; }
  .seg[hidden] { display: none; }
  .seg-row {
    display: flex; gap: 2px; padding: 2px; background: #eef0f2;
    border-radius: 9px; border: 1px solid #e1e4e8;
  }
  .seg-btn {
    flex: 1; padding: 7px 8px; font-size: 12px; font-weight: 500;
    border: 0; border-radius: 7px; background: transparent; color: #57606a;
    cursor: pointer; font-family: inherit;
  }
  .seg-btn.on { background: #3b82f6; color: #fff; }
  .seg-btn:disabled { opacity: 0.5; cursor: default; }
  .seg-hint { font-size: 11px; color: #6a737d; margin-top: 6px; min-height: 14px; }
  .seg-hint .dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #d29922; margin-right: 5px; vertical-align: middle;
  }
  .seg-hint.ready .dot { background: #2ea043; }
  .swatch {
    display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 4px;
  }
  #msg {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #6a737d; font-size: 14px; text-align: center; padding: 24px; z-index: 5;
  }
  /* `display:flex` above outranks the UA stylesheet's [hidden]{display:none},
     so without this the loading overlay never goes away once the model loads. */
  #msg[hidden], #hud[hidden] { display: none; }
  a { color: #3b82f6; }
</style>
</head>
<body>
<div id="stage"></div>
<div id="msg">Loading…</div>

<div id="hud" hidden>
  <h1 id="vname">—</h1>
  <div class="sub" id="vsub">—</div>
  <div class="stat"><span>Splats</span><b id="sSplats">—</b></div>
  <div class="stat"><span>Observed</span><b id="sObs">—</b></div>
  <div class="stat"><span>Confidence</span><b id="sConf">—</b></div>
  <div class="controls">
    <div id="consolidate" class="seg" hidden>
      <div class="seg-row">
        <button class="seg-btn" id="btnBefore" type="button">Before</button>
        <button class="seg-btn on" id="btnAfter" type="button">Photoreal</button>
      </div>
      <div class="seg-hint" id="cvStatus">—</div>
    </div>
    <label class="ctl">
      <input type="checkbox" id="cProv"> Show what's real vs guessed
    </label>
    <div class="legend" id="legend">
      <span><i class="swatch" style="background:#40cc66"></i>observed</span>
      &nbsp;
      <span><i class="swatch" style="background:#f25940"></i>prior guess</span>
      <div style="margin-top:2px">brightness = confidence</div>
    </div>
    <label class="ctl">
      <input type="checkbox" id="cSpin" checked> Auto-rotate
    </label>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.6/build/gaussian-splats-3d.module.js"
  }
}
</script>
<script type="module" src="main.js"></script>
</body>
</html>
